<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0c4065"/>
  <!-- 一葉（ひとは）モチーフ -->
  <g transform="translate(256, 260)">
    <!-- 葉っぱ本体 -->
    <path d="M0,-160 C80,-140 140,-60 140,40 C140,120 80,180 0,180 C-80,180 -140,120 -140,40 C-140,-60 -80,-140 0,-160Z" fill="none" stroke="#d4a84a" stroke-width="12" opacity="0.9"/>
    <!-- 葉脈（中央） -->
    <line x1="0" y1="-140" x2="0" y2="160" stroke="#d4a84a" stroke-width="6" opacity="0.6"/>
    <!-- 葉脈（左） -->
    <path d="M0,-40 C-40,-20 -70,10 -90,40" fill="none" stroke="#d4a84a" stroke-width="4" opacity="0.4"/>
    <path d="M0,30 C-35,50 -65,70 -80,100" fill="none" stroke="#d4a84a" stroke-width="4" opacity="0.4"/>
    <!-- 葉脈（右） -->
