    <path d="M0,30 C35,50 65,70 80,100" fill="none" stroke="#d4a84a" stroke-width="4" opacity="0.4"/>
    <!-- 茎 -->
    <path d="M0,160 C10,190 5,210 0,220" fill="none" stroke="#d4a84a" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
